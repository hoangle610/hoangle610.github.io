<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - MangaOCR Translator</title>
  <style>
    :root {
      --bg: #1a1a1a;
      --card-bg: #2d2d2d;
      --text: #ffffff;
      --text-muted: #9ca3af;
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --error: #ef4444;
      --success: #10b981;
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }

    .container {
      background-color: var(--card-bg);
      padding: 32px;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
      font-size: 24px;
      font-weight: bold;
    }

    h2 {
      text-align: center;
      margin-top: 0;
      margin-bottom: 8px;
    }

    p {
      text-align: center;
      color: var(--text-muted);
      margin-bottom: 24px;
      font-size: 14px;
    }

    .input-group {
      margin-bottom: 16px;
    }

    input {
      width: 100%;
      padding: 12px;
      background-color: #1a1a1a;
      border: 1px solid #4b5563;
      border-radius: 6px;
      color: var(--text);
      font-size: 14px;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--primary);
    }

    button {
      width: 100%;
      padding: 12px;
      background-color: var(--primary);
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.2s;
    }

    button:hover {
      background-color: var(--primary-hover);
    }

    button:disabled {
      opacity: 0.7;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      text-align: center;
      font-size: 14px;
      display: none;
    }

    .message.error {
      color: var(--error);
      display: block;
    }

    .message.success {
      color: var(--success);
      display: block;
    }

    #app {
      display: none;
    }
  </style>
</head>
<body>

  <div class="container" id="loadingContainer">
    <h2>Verifying Link...</h2>
    <p>Please wait a moment.</p>
  </div>

  <div class="container" id="app">
    <div class="logo">⚡ MangaOCR</div>
    <h2>Set New Password</h2>
    <p>Enter your new password below.</p>

    <div class="input-group">
      <input type="password" id="password" placeholder="New Password" autocomplete="new-password">
    </div>
    <div class="input-group">
      <input type="password" id="confirmPassword" placeholder="Confirm New Password" autocomplete="new-password">
    </div>

    <button id="submitBtn">Update Password</button>

    <div id="message" class="message"></div>
  </div>

  <!-- Load Supabase Config -->
  <script src="config.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const hash = window.location.hash.substring(1);
      const params = new URLSearchParams(hash);
      
      const accessToken = params.get('access_token');
      const errorMsg = params.get('error_description') || params.get('error');

      const loadingContainer = document.getElementById('loadingContainer');
      const appContainer = document.getElementById('app');
      const messageEl = document.getElementById('message');
      const passwordEl = document.getElementById('password');
      const confirmPasswordEl = document.getElementById('confirmPassword');
      const submitBtn = document.getElementById('submitBtn');

      function showMessage(msg, isError = true) {
        messageEl.textContent = msg;
        messageEl.className = 'message ' + (isError ? 'error' : 'success');
      }

      if (errorMsg) {
        loadingContainer.style.display = 'none';
        appContainer.style.display = 'block';
        passwordEl.style.display = 'none';
        confirmPasswordEl.style.display = 'none';
        submitBtn.style.display = 'none';
        showMessage(errorMsg.replace(/\+/g, ' '), true);
        return;
      }

      if (!accessToken) {
        loadingContainer.style.display = 'none';
        appContainer.style.display = 'block';
        passwordEl.style.display = 'none';
        confirmPasswordEl.style.display = 'none';
        submitBtn.style.display = 'none';
        showMessage('Invalid or missing password reset token. Please request a new link from the extension.', true);
        return;
      }

      // Valid token
      loadingContainer.style.display = 'none';
      appContainer.style.display = 'block';

      submitBtn.addEventListener('click', async () => {
        const pass = passwordEl.value;
        const confirmPass = confirmPasswordEl.value;

        if (!pass) {
          showMessage('Please enter a new password.');
          return;
        }

        if (pass.length < 6) {
          showMessage('Password must be at least 6 characters.');
          return;
        }

        if (pass !== confirmPass) {
          showMessage('Passwords do not match.');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Updating...';
        messageEl.style.display = 'none';

        try {
          const response = await fetch(`${CONFIG.SUPABASE_URL}/auth/v1/user`, {
            method: 'PUT',
            headers: {
              'Content-Type': 'application/json',
              'apikey': CONFIG.SUPABASE_ANON_KEY,
              'Authorization': `Bearer ${accessToken}`
            },
            body: JSON.stringify({ password: pass })
          });

          if (!response.ok) {
            const err = await response.json().catch(() => ({}));
            throw new Error(err.error_description || err.msg || 'Failed to update password.');
          }

          showMessage('Password updated successfully! You can now close this page and log into the MangaOCR extension.', false);
          passwordEl.style.display = 'none';
          confirmPasswordEl.style.display = 'none';
          submitBtn.style.display = 'none';

        } catch (err) {
          showMessage(err.message, true);
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Update Password';
        }
      });
    });
  </script>
</body>
</html>
